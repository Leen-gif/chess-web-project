<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Frontend - Spiel hosten</title>
  <style>
    :root {
      --bg-a: #121416;
      --panel: #262421;
      --line: #3d3a35;
      --text: #f0f0f0;
      --muted: #b7b7b7;
      --accent: #3a7bd5;
      --accent-hover: #2f66b1;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #2a2e33 0%, var(--bg-a) 42%, #0f1113 100%);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    .content-panel,
    .menu-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      padding: 20px;
    }

    h1 { margin: 0; }
    p { margin: 8px 0 16px; color: var(--muted); }
    .stack { display: grid; gap: 10px; max-width: 360px; }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      background: var(--accent);
      color: #111;
      padding: 0 14px;
      border: 0;
      cursor: pointer;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn.secondary { background: transparent; color: #d6d6d6; border: 1px solid #5a5a5a; }
    .btn.secondary:hover { background: #3a3a3a; }

    .menu-title { margin: 0 0 12px; }
    .menu-links { display: grid; gap: 9px; }

    @media (max-width: 980px) { .page { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="content-panel">
      <h1>Spiel hosten</h1>
      <p>Erstelle eine Session und teile den Code mit deinem Gegner.</p>
      <div class="stack">
        <button class="btn" type="button">Spiel erstellen</button>
        <a class="btn secondary" href="index.html">Zurück</a>
      </div>
    </section>

    <aside class="menu-panel" aria-label="Hauptnavigation">
      <h2 class="menu-title">Menü</h2>
      <nav class="menu-links">
        <a class="btn" href="index.html">Hauptmenu</a>
        <a class="btn" href="bot.html">Gegen Bot</a>
        <a class="btn" href="duo.html">PVP</a>
        <a class="btn" href="host.html">Spiel hosten</a>
        <a class="btn" href="join.html">Spiel beitreten</a>
      </nav>
    </aside>
  </main>
</body>
</html>
