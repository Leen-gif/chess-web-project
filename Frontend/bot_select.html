<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Frontend - Bot Auswahl</title>
  <style>
    :root {
      --bg-a: #0f1113;
      --bg-b: #1c1f24;
      --panel: #262421;
      --panel-2: #2f2c28;
      --text: #f0f0f0;
      --muted: #b7b7b7;
      --accent: #3a7bd5;
      --accent-hover: #2f66b1;
      --line: #3d3a35;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, var(--bg-b) 0%, var(--bg-a) 58%, #0b0d0f 100%);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    .content-panel,
    .menu-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      padding: 20px;
    }

    .panel-head h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.6vw, 2rem);
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .difficulty-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .difficulty-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid transparent;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .difficulty-card:hover {
      border-color: rgba(58, 123, 213, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }

    .difficulty-card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: #15171a;
      border-radius: 10px;
      padding: 10px;
    }

    .difficulty-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .difficulty-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .menu-title { margin: 0 0 12px; }
    .menu-links { display: grid; gap: 9px; }

    .menu-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #111;
      transition: background-color 0.18s ease;
    }

    .menu-link:hover { background: var(--accent-hover); }

    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content-panel">
      <div class="panel-head">
        <h1>Bot Schwierigkeit wählen</h1>
        <p>Wähle eine Stufe und starte sofort eine Partie gegen den Bot.</p>
      </div>

      <div class="difficulty-grid" aria-label="Schwierigkeitsauswahl">
        <a class="difficulty-card" href="bot.html?difficulty=easy" data-difficulty="easy">
          <img src="icons/easy_transperent.png" alt="Einfach">
          <h2 class="difficulty-title">Einfach</h2>
          <p class="difficulty-note">Für schnelle, entspannte Runden.</p>
        </a>
        <a class="difficulty-card" href="bot.html?difficulty=medium" data-difficulty="medium">
          <img src="icons/medium.png" alt="Mittel">
          <h2 class="difficulty-title">Mittel</h2>
          <p class="difficulty-note">Ausgewogen und herausfordernd.</p>
        </a>
        <a class="difficulty-card" href="bot.html?difficulty=hard" data-difficulty="hard">
          <img src="icons/hard.png" alt="Schwer">
          <h2 class="difficulty-title">Schwer</h2>
          <p class="difficulty-note">Für starke Spielerinnen und Spieler.</p>
        </a>
      </div>
    </section>

    <aside class="menu-panel" aria-label="Hauptnavigation">
      <h2 class="menu-title">Menü</h2>
      <nav class="menu-links">
        <a class="menu-link" href="index.html">Hauptmenu</a>
        <a class="menu-link" href="bot_select.html">Gegen Bot</a>
        <a class="menu-link" href="duo.html">PVP</a>
      </nav>
    </aside>
  </main>

  <script src="js/chess-state.js"></script>
  <script>
    const difficultyProfiles = {
      easy: {
        label: "Einfach"
      },
      medium: {
        label: "Mittel"
      },
      hard: {
        label: "Schwer"
      }
    };

    function persistDifficulty(key) {
      const profile = difficultyProfiles[key];
      if (!profile) return;
      window.ChessState.setDifficulty(key);
    }

    document.querySelectorAll(".difficulty-card").forEach((card) => {
      card.addEventListener("click", (event) => {
        const key = card.dataset.difficulty;
        if (!key) return;
        persistDifficulty(key);
      });
    });
  </script>
</body>
</html>
