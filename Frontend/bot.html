<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Frontend - Gegen Bot</title>
  <style>
    :root {
      --bg-a: #121416;
      --bg-b: #1a1d21;
      --panel: #262421;
      --panel-2: #302e2b;
      --text: #f0f0f0;
      --muted: #b7b7b7;
      --accent: #3a7bd5;
      --accent-hover: #2f66b1;
      --line: #3d3a35;
      --light: #e8eef8;
      --dark: #4a6fa5;
      --danger: #e15b64;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #2a2e33 0%, var(--bg-a) 42%, #0f1113 100%);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    .content-panel,
    .menu-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      padding: 20px;
    }

    .panel-head h1 { margin: 0; font-size: clamp(1.35rem, 2.5vw, 1.9rem); }
    .panel-head p { margin: 6px 0 0; color: var(--muted); }

    .difficulty-pill,
    .session-pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #4f4a44;
      background: #211f1c;
      font-size: 0.85rem;
      color: #d9d9d9;
    }

    .board-shell {
      margin-top: 16px;
      position: relative;
      width: min(100%, 760px);
      aspect-ratio: 1 / 1;
      border: 1px solid #000;
      overflow: hidden;
      background: #111;
    }

    .board-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
    }

    .board-square { position: relative; display: flex; align-items: center; justify-content: center; }
    .board-square.light { background: var(--light); }
    .board-square.dark { background: var(--dark); }
    .board-square.selected { box-shadow: inset 0 0 0 3px rgba(58, 123, 213, 0.95); }

    .board-piece {
      width: 84%;
      height: 84%;
      object-fit: contain;
      user-select: none;
      cursor: grab;
    }

    .checkmate-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 10, 0.74);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      text-align: center;
      z-index: 4;
      padding: 16px;
    }

    .checkmate-overlay.show { display: flex; }
    .checkmate-title { margin: 0; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; }
    .checkmate-sub { margin: 0; color: #dadada; }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn,
    .menu-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #111;
      transition: background-color 0.18s ease;
    }

    .btn:hover,
    .menu-link:hover { background: var(--accent-hover); }

    .btn.secondary {
      background: transparent;
      color: #d6d6d6;
      border-color: #5a5a5a;
    }

    .btn.secondary:hover { background: #3a3a3a; }

    .logger {
      margin-top: 14px;
      width: min(100%, 760px);
      background: var(--panel-2);
      border: 1px solid #47433d;
      border-radius: 12px;
      padding: 12px;
    }

    .logger-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logger-title { margin: 0; font-size: 1rem; }

    .status {
      margin: 0;
      font-size: 0.88rem;
      border: 1px solid #5a5a5a;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      background: #262421;
    }

    .move-log {
      margin: 0;
      padding-left: 18px;
      max-height: 240px;
      overflow: auto;
      display: grid;
      gap: 5px;
      font-size: 0.92rem;
      color: #e4e4e4;
    }

    .menu-title { margin: 0 0 12px; }
    .menu-links { display: grid; gap: 9px; }

    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content-panel">
      <div class="panel-head">
        <h1>Gegen Bot</h1>
        <p id="game-subtitle">API-gestuetztes Spiel gegen den Backend-Bot.</p>
        <div id="difficulty-pill" class="difficulty-pill" aria-live="polite"></div>
        <div id="session-pill" class="session-pill" aria-live="polite">Session: nicht verbunden</div>
      </div>

      <div class="board-shell">
        <div id="bot-board" class="board-placeholder" aria-label="Schachbrett"></div>
        <div id="checkmate-overlay" class="checkmate-overlay" role="status" aria-live="polite">
          <p class="checkmate-title">Checkmate</p>
          <p id="checkmate-text" class="checkmate-sub">Spiel beendet</p>
        </div>
      </div>

      <div class="controls">
        <button id="reset-btn" class="btn" type="button">Neues Spiel</button>
        <a class="btn secondary" href="index.html">Zurueck</a>
      </div>

      <section class="logger" aria-label="Zugprotokoll">
        <div class="logger-head">
          <h2 class="logger-title">Move Logger</h2>
          <p id="status" class="status">Lade...</p>
        </div>
        <ol id="move-log" class="move-log"></ol>
      </section>
    </section>

    <aside class="menu-panel" aria-label="Hauptnavigation">
      <h2 class="menu-title">Menue</h2>
      <nav class="menu-links">
        <a class="menu-link" href="index.html">Hauptmenu</a>
        <a class="menu-link" href="bot_select.html">Gegen Bot</a>
        <a class="menu-link" href="duo.html">PVP</a>
      </nav>
    </aside>
  </main>

  <script src="js/chess-api.js"></script>
  <script src="js/chess-state.js"></script>
  <script src="js/chess-board-page.js"></script>
  <script>
    const difficultyPill = document.getElementById("difficulty-pill");
    const difficultyProfiles = {
      easy: { label: "Einfach" },
      medium: { label: "Mittel" },
      hard: { label: "Schwer" }
    };

    function persistDifficulty(key) {
      if (!difficultyProfiles[key]) return;
      window.ChessState.setDifficulty(key);
    }

    function resolveDifficulty() {
      const fromQuery = window.ChessState.getQueryParam("difficulty");
      if (fromQuery && difficultyProfiles[fromQuery]) {
        persistDifficulty(fromQuery);
        return fromQuery;
      }

      const stored = window.ChessState.getDifficulty();
      if (stored && difficultyProfiles[stored]) return stored;

      persistDifficulty("medium");
      return "medium";
    }

    const activeDifficulty = resolveDifficulty();
    const activeProfile = difficultyProfiles[activeDifficulty];
    difficultyPill.textContent = "Schwierigkeit: " + activeProfile.label;

    window.createChessBoardPage({
      boardId: "bot-board",
      overlayId: "checkmate-overlay",
      checkmateTextId: "checkmate-text",
      moveLogId: "move-log",
      statusId: "status",
      resetBtnId: "reset-btn",
      sessionIdElementId: "session-pill",
      subtitleId: "game-subtitle",
      gameId: window.ChessState.getQueryParam("game_id"),
      createPayload: function () {
        return { mode: "bot", bot_level: activeDifficulty };
      },
      buildQueryParams: function (gameId) {
        return { difficulty: activeDifficulty, game_id: gameId };
      },
      getSubtitle: function () {
        return "Backend-Partie gegen Bot auf Stufe " + activeProfile.label + ".";
      }
    });
  </script>
</body>
</html>
